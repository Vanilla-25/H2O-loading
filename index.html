<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H2O Networks Loading</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        overflow: hidden;
        color: white;
    }

    /* Background image */
    .background {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url("background.jpg") center/cover no-repeat;
        filter: blur(8px) brightness(0.6);
        transform: scale(1.1);
        z-index: -2;
    }

    /* Star particles */
    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
    }

    /* Center content */
    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    .logo {
        font-size: 60px;
        font-weight: bold;
        letter-spacing: 4px;
    }

    .subtitle {
        margin-top: 10px;
        opacity: 0.8;
    }

    /* Loading bar */
    .loading-container {
        position: absolute;
        bottom: 40px;
        width: 80%;
        left: 50%;
        transform: translateX(-50%);
    }

    .loading-text {
        font-size: 14px;
        margin-bottom: 8px;
        opacity: 0.7;
    }

    .bar {
        width: 100%;
        height: 8px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        overflow: hidden;
    }

    .progress {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        transition: width 0.3s;
    }
</style>
</head>

<body>

<div class="background"></div>
<canvas id="stars"></canvas>

<div class="center">
    <div class="logo">H2O</div>
    <div class="subtitle">Networks Roleplay</div>
</div>

<div class="loading-container">
    <div class="loading-text" id="loadingText">
        Initializing...
    </div>
    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>
</div>

<script>
/* Star particle effect */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        speed: Math.random() * 0.3
    });
}

function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    stars.forEach(star => {
        star.y += star.speed;
        if (star.y > canvas.height) star.y = 0;

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animateStars);
}

animateStars();

/* Fake loading progress (you can replace with GMod hooks later) */
let progress = 0;
let progressBar = document.getElementById("progress");
let loadingText = document.getElementById("loadingText");

let messages = [
    "Loading assets...",
    "Downloading content...",
    "Preparing server...",
    "Syncing data...",
    "Almost ready..."
];

let interval = setInterval(() => {
    progress += Math.random() * 10;

    if (progress >= 100) {
        progress = 100;
        loadingText.innerText = "Ready!";
        clearInterval(interval);
    } else {
        loadingText.innerText = messages[Math.floor(Math.random() * messages.length)];
    }

    progressBar.style.width = progress + "%";
}, 700);
</script>

</body>
</html>
