<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H2O Networks Loading</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    overflow: hidden;
    color: white;
    background: black;
}

/* Background */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    top: -5%;
    left: -5%;
    background: url("background.jpg") center/cover no-repeat;
    filter: blur(10px) brightness(0.5);
    z-index: -2;

    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

/* Stars */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;

    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

/* Center text */
.center {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;

    opacity: 0;
    animation: fadeInUp 2s ease forwards;
    animation-delay: 0.5s;
}

.logo-text {
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 4px;
    animation: glowText 2.5s ease-in-out infinite alternate;
}

.subtitle {
    margin-top: 10px;
    opacity: 0.8;
    font-size: 20px;
}

/* Loading */
.loading-container {
    position: absolute;
    bottom: 40px;
    width: 80%;
    left: 50%;
    transform: translateX(-50%);

    opacity: 0;
    animation: fadeInUp 2s ease forwards;
    animation-delay: 1s;
}

.loading-text {
    font-size: 14px;
    margin-bottom: 8px;
    opacity: 0.7;
}

.bar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    transition: width 0.3s;
}

/* Animations */
@keyframes fadeIn {
    to { opacity: 1; }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translate(-50%, -30%);
    }
    to {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
}

@keyframes glowText {
    from {
        text-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
    }
    to {
        text-shadow: 0 0 25px rgba(0, 200, 255, 1);
    }
}
</style>
</head>

<body>

<div class="background" id="bg"></div>
<canvas id="stars"></canvas>

<div class="center">
    <div class="logo-text">H2O Networks</div>
    <div class="subtitle">Clone Wars Roleplay</div>
</div>

<div class="loading-container">
    <div class="loading-text" id="loadingText">Initializing...</div>
    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>
</div>

<script>
/* Starfield + Hyperspace */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let hyperspace = false;

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width - canvas.width / 2,
        y: Math.random() * canvas.height - canvas.height / 2,
        z: Math.random() * 1000
    });
}

function animateStars() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
        let speed = hyperspace ? 25 : 2;
        star.z -= speed;

        if (star.z <= 0) {
            star.x = Math.random() * canvas.width - canvas.width / 2;
            star.y = Math.random() * canvas.height - canvas.height / 2;
            star.z = 1000;
        }

        let k = 128.0 / star.z;
        let x = star.x * k + canvas.width / 2;
        let y = star.y * k + canvas.height / 2;

        let size = (1 - star.z / 1000) * 3;

        ctx.fillStyle = "white";

        if (hyperspace) {
            ctx.fillRect(x, y, size * 8, 1);
        } else {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    requestAnimationFrame(animateStars);
}
animateStars();

/* Parallax */
const bg = document.getElementById("bg");

document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 0.5) * 20;
    let y = (e.clientY / window.innerHeight - 0.5) * 20;

    bg.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
});

/* Loading */
let progress = 0;
let progressBar = document.getElementById("progress");
let loadingText = document.getElementById("loadingText");

let messages = [
    "Loading clones...",
    "Preparing fleet...",
    "Deploying battalions...",
    "Linking Republic systems...",
    "Jumping to hyperspace..."
];

let interval = setInterval(() => {
    progress += Math.random() * 10;

    if (progress >= 100) {
        progress = 100;
        progressBar.style.width = "100%";
        loadingText.innerText = "Entering hyperspace...";

        clearInterval(interval);

        hyperspace = true;

        setTimeout(() => {
            document.body.style.transition = "opacity 1.5s ease";
            document.body.style.opacity = "0";
        }, 1200);

    } else {
        loadingText.innerText = messages[Math.floor(Math.random() * messages.length)];
        progressBar.style.width = progress + "%";
    }

}, 700);
</script>

</body>
</html>
