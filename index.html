<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H2O Networks Loading</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    overflow: hidden;
    color: white;
}

/* Background (NO blur now) */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    top: -5%;
    left: -5%;
    background: url("background.jpg") center/cover no-repeat;

    filter: brightness(0.7) contrast(1.1);
    z-index: -2;
}

/* Stars */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Center text */
.center {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.logo-text {
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 4px;

    text-shadow: 0 0 20px rgba(255,255,255,0.8);
}

.subtitle {
    margin-top: 10px;
    opacity: 0.85;
    font-size: 20px;
}

/* ===== LOADING BAR (FIXED TO BOTTOM, STOPS BEFORE GMod UI) ===== */
.loading-container {
    position: fixed;
    bottom: 0;
    left: 0;

    /* Leaves space for GMod panel on right */
    width: calc(100% - 320px);

    padding: 10px 20px;
}

/* Text */
.loading-text {
    font-size: 13px;
    margin-bottom: 6px;
    opacity: 0.7;
}

/* Bar background */
.bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
}

/* Progress */
.progress {
    height: 100%;
    width: 0%;

    /* cleaner white bar */
    background: rgba(255,255,255,0.9);

    transition: width 0.25s ease;
}
</style>
</head>

<body>

<div class="background" id="bg"></div>
<canvas id="stars"></canvas>

<div class="center">
    <div class="logo-text">H2O Networks</div>
    <div class="subtitle">Clone Wars Roleplay</div>
</div>

<div class="loading-container">
    <div class="loading-text" id="loadingText">Initializing...</div>
    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>
</div>

<script>
/* Stars */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.2,
        speed: Math.random() * 0.3
    });
}

function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255,255,255,0.7)";

    stars.forEach(star => {
        star.y += star.speed;
        if (star.y > canvas.height) star.y = 0;

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animateStars);
}
animateStars();

/* Fake loading */
let progress = 0;
let progressBar = document.getElementById("progress");
let loadingText = document.getElementById("loadingText");

let messages = [
    "Loading clones...",
    "Preparing fleet...",
    "Deploying battalions...",
    "Linking Republic systems...",
    "Almost ready..."
];

let interval = setInterval(() => {
    progress += Math.random() * 10;

    if (progress >= 100) {
        progress = 100;
        loadingText.innerText = "Ready!";
        clearInterval(interval);
    } else {
        loadingText.innerText = messages[Math.floor(Math.random() * messages.length)];
    }

    progressBar.style.width = progress + "%";
}, 700);
</script>

</body>
</html>
