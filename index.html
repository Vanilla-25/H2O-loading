```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H2O Networks Loading</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    overflow: hidden;
    color: white;
}

/* Background */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    top: -5%;
    left: -5%;
    background: url("background.jpg") center/cover no-repeat;

    /* Less blur + sharper look */
    filter: blur(4px) brightness(0.65) contrast(1.1);
    z-index: -2;

    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

/* Stars */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;

    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

/* Center text */
.center {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;

    opacity: 0;
    animation: fadeInUp 2s ease forwards;
    animation-delay: 0.5s;
}

/* Logo text */
.logo-text {
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 4px;

    /* White glow */
    animation: glowTextWhite 2.5s ease-in-out infinite alternate;
}

.subtitle {
    margin-top: 10px;
    opacity: 0.85;
    font-size: 20px;
}

/* Loading */
.loading-container {
    position: absolute;
    bottom: 40px;
    width: 80%;
    left: 50%;
    transform: translateX(-50%);

    opacity: 0;
    animation: fadeInUp 2s ease forwards;
    animation-delay: 1s;
}

.loading-text {
    font-size: 14px;
    margin-bottom: 8px;
    opacity: 0.7;
}

/* Bar */
.bar {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(5px);
}

.progress {
    height: 100%;
    width: 0%;

    /* Clean white gradient */
    background: linear-gradient(90deg, #ffffff, #dcdcdc);

    border-radius: 20px;
    box-shadow: 0 0 10px rgba(255,255,255,0.4);

    transition: width 0.3s;
}

/* Animations */
@keyframes fadeIn {
    to { opacity: 1; }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translate(-50%, -30%);
    }
    to {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
}

@keyframes glowTextWhite {
    from {
        text-shadow: 0 0 8px rgba(255,255,255,0.3);
    }
    to {
        text-shadow: 0 0 22px rgba(255,255,255,0.9);
    }
}
</style>
</head>

<body>

<div class="background" id="bg"></div>
<canvas id="stars"></canvas>

<div class="center">
    <div class="logo-text">H2O Networks</div>
    <div class="subtitle">Clone Wars Roleplay</div>
</div>

<div class="loading-container">
    <div class="loading-text" id="loadingText">Initializing...</div>
    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>
</div>

<script>
/* Stars */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 180; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        speed: Math.random() * 0.4
    });
}

function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(star => {
        star.y += star.speed;
        if (star.y > canvas.height) star.y = 0;

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animateStars);
}
animateStars();

/* Parallax */
const bg = document.getElementById("bg");

document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 0.5) * 20;
    let y = (e.clientY / window.innerHeight - 0.5) * 20;

    bg.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
});

/* Fake loading */
let progress = 0;
let progressBar = document.getElementById("progress");
let loadingText = document.getElementById("loadingText");

let messages = [
    "Loading clones...",
    "Preparing fleet...",
    "Deploying battalions...",
    "Linking Republic systems...",
    "Almost ready..."
];

let interval = setInterval(() => {
    progress += Math.random() * 10;

    if (progress >= 100) {
        progress = 100;
        loadingText.innerText = "Ready!";
        clearInterval(interval);
    } else {
        loadingText.innerText = messages[Math.floor(Math.random() * messages.length)];
    }

    progressBar.style.width = progress + "%";
}, 700);
</script>

</body>
</html>
```
